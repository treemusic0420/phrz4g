name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Use LTS for maximum action/dependency compatibility in CI.
          node-version: 20

      - name: Create .env for Vite build
        run: |
          cat <<ENVEOF > .env
          VITE_APP_PASSCODE=${{ secrets.VITE_APP_PASSCODE }}
          ENVEOF

      - name: Validate VITE_APP_PASSCODE value (no secrets output)
        run: |
          node -e "
          const value = process.env.VITE_APP_PASSCODE;
          const exists = !!value;
          console.log('VITE_APP_PASSCODE_EXISTS=' + exists);
          if (!exists || value === 'undefined') {
            throw new Error('VITE_APP_PASSCODE is missing or invalid');
          }
          "
        env:
          VITE_APP_PASSCODE: ${{ secrets.VITE_APP_PASSCODE }}

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_APP_PASSCODE: ${{ secrets.VITE_APP_PASSCODE }}

      - name: Create Firebase service account file
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PHRZ4G }}' > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Deploy to Firebase Hosting (live)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: npx firebase-tools deploy --only hosting --project phrz4g
